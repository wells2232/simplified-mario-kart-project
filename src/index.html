<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Mario Kart</title>
    <style>
        body {
            margin: 0;
            background-image: url("../docs/image.png");
            background-size: cover;
            font-family: Arial, sans-serif;
            height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;

        }
        h1, h2, p {
            text-align: center;
        }
        .menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }
        .menu-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
            width: 40%;
            max-width: 100%;
            gap: 10px;
        }

        #selectionStatus
        {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 16px;
        }
        .menu-item.active {
            background: gold;
            color: black;
            border-color: orange;
            transform: scale(1.02);
            font-weight: bold;
        }
        .menu-item img {
            width: 50px;
            height: 50px;
            margin-right: 10px;
        }
        .status {
            margin-top: 18px;
            text-align: center;
            font-size: 18px;
        }
        .menu-item span {
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }

        .hidden {
            display: none;
        }

        .battle-info {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            background: rgba(255,255,255,0.08);
            height: 20%;
        }

        .log {
            margin-top: 20px;
            background: rgba(0,0,0,0.45);
            border-radius: 12px;
            padding: 16px;
            max-height: 240px;
            overflow-y: auto;
            white-space: pre-line;
            font-family: Consolas, monospace;
            color: aliceblue;
        }
        .players-summary {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .btn {
            display: block;
            margin: 20px auto 0;
            border: none;
            border-radius: 10px;
            padding: 12px 18px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body >
    <div class="container">
        <h1>Mario Kart Simulator</h1>

        <div id="selectionScreen">
            <h2 id="selectionTitle">Escolha o primeiro competidor</h2>
            <p>Use ↑ e ↓ para navegar, Enter para confirmar.</p>

            <div id="menu" class="menu"></div>

            <div class="status" id="selectionStatus">
                Player 1: não selecionado<br>
                Player 2: não selecionado
                <p class="hint">Você também pode clicar com o mouse.</p>
            </div>
        </div>
        <div id="raceScreen" class="hidden">
            <h2>Corrida</h2>

            <div class="players-summary">
            <div class="card" id="player1Card"></div>
            <div class="card" id="player2Card"></div>
            </div>

            <div class="battle-info" id="battleInfo"></div>

            <div class="log" id="log"></div>

            <button class="btn" id="restartBtn">Jogar novamente</button>
        </div>
    </div>

    <script src="./index.js">
        
    </script>
</body>
</html>
